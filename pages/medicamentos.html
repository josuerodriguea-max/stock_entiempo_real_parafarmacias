<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FarmaStock | Medicamentos</title>
    <link rel="stylesheet" href="../css/dashboard.css">
</head>
<body class="dashboard-page">
    <div class="dashboard-shell">
        <aside class="sidebar">
            <div class="sidebar-brand">
                <span class="sidebar-icon">⚕️</span>
                <span>FarmaStock</span>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item">
                    <span class="icon">🏠</span>
                    <span>Inicio</span>
                </a>
                <a href="medicamentos.html" class="nav-item active">
                    <span class="icon">💊</span>
                    <span>Medicamentos</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <button id="themeToggle" class="btn-theme">🌙 Modo oscuro</button>
                <button id="logoutBtn" class="btn-logout">Cerrar sesión</button>
            </div>
        </aside>

        <main class="dashboard-main">
            <header class="topbar">
                <div class="search-box">
                    <input id="medSearch" type="search" placeholder="Buscar por código, nombre, categoría, laboratorio, proveedor, lote, estado...">
                </div>
                <div class="topbar-right">
                    <div class="user-profile">
                        <div class="user-avatar">FS</div>
                        <div class="user-info">
                            <div style="display:flex;align-items:center;gap:0.6rem;">
                                <strong id="userName">Usuario</strong>
                                <div id="userClock" class="clock" aria-live="polite">--:--:--</div>
                            </div>
                            <small id="userRole">Rol</small>
                        </div>
                    </div>
                </div>
            </header>

            <section class="dashboard-content">
                <div class="actions-bar">
                    <button id="btnNewMed" class="btn-action btn-primary">➕ Nuevo Medicamento</button>
                    <select id="pageSizeSelect">
                        <option value="10">10</option>
                        <option value="25">25</option>
                        <option value="50">50</option>
                        <option value="100">100</option>
                    </select>
                    <button id="btnExportCsv" class="btn-action">Exportar CSV</button>
                    <button id="btnPrint" class="btn-action">Imprimir</button>
                </div>

                <div class="table-panel">
                    <div class="table-header">
                        <h2>Listado de Medicamentos</h2>
                        <span>Gestión completa de medicamentos</span>
                    </div>
                    <div class="table-wrapper">
                        <table class="data-table" id="medTable">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Código</th>
                                    <th>Código de Barras</th>
                                    <th>Nombre</th>
                                    <th>Descripción</th>
                                    <th>Categoría</th>
                                    <th>Laboratorio</th>
                                    <th>Proveedor</th>
                                    <th>Precio Compra</th>
                                    <th>Precio Venta</th>
                                    <th>Stock</th>
                                    <th>Stock Mínimo</th>
                                    <th>Lote</th>
                                    <th>Vencimiento</th>
                                    <th>Estado</th>
                                    <th>Acciones</th>
                                </tr>
                            </thead>
                            <tbody id="medTableBody">
                            </tbody>
                        </table>
                    </div>
                </div>

                <div id="medFormContainer" class="modal" style="display:none;">
                    <div class="modal-content">
                        <h3 id="medFormTitle">Nuevo Medicamento</h3>
                        <form id="medForm">
                            <input type="hidden" id="medId">
                            <div class="form-row"><label>Código</label><input id="medCodigo"></div>
                            <div class="form-row"><label>Código de Barras</label><input id="medCodigoBarras"></div>
                            <div class="form-row"><label>Nombre</label><input id="medNombre"></div>
                            <div class="form-row"><label>Descripción</label><input id="medDescripcion"></div>
                            <div class="form-row"><label>Categoría</label><input id="medCategoria"></div>
                            <div class="form-row"><label>Laboratorio</label><input id="medLaboratorio"></div>
                            <div class="form-row"><label>Proveedor</label><input id="medProveedor"></div>
                            <div class="form-row"><label>Precio Compra</label><input id="medPrecioCompra" type="number" step="0.01"></div>
                            <div class="form-row"><label>Precio Venta</label><input id="medPrecioVenta" type="number" step="0.01"></div>
                            <div class="form-row"><label>Stock Inicial</label><input id="medStock" type="number"></div>
                            <div class="form-row"><label>Stock Mínimo</label><input id="medStockMin" type="number"></div>
                            <div class="form-row"><label>Fecha de Vencimiento</label><input id="medExpiry" type="date"></div>
                            <div class="form-row"><label>Número de Lote</label><input id="medLote"></div>
                            <div class="form-row"><label>Ubicación</label><input id="medUbicacion"></div>
                            <div class="form-row"><label>Estado</label>
                                <select id="medEstado"><option value="activo">Activo</option><option value="inactivo">Inactivo</option></select>
                            </div>
                            <div class="form-actions">
                                <button type="submit" id="saveMedBtn">Guardar</button>
                                <button type="button" id="cancelMedBtn">Cancelar</button>
                            </div>
                            <div id="medFormMsg" class="login-message"></div>
                        </form>
                    </div>
                </div>

            </section>
        </main>
    </div>
    <script src="../js/app.js"></script>
    <script src="../js/medicamentos.js"></script>
</body>
</html>
