<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FarmaStock | Iniciar Sesión</title>
    <link rel="stylesheet" href="../css/login.css">
</head>
<body class="login-page">
    <div class="login-container fade-in">
        <div class="login-card">
            <div class="login-header">
                <img src="../img/logo-farmastock.png" alt="FarmaStock" class="login-logo">
                <h1>Sistema Inteligente de Gestión Farmacéutica</h1>
            </div>
            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="usuario">Usuario</label>
                    <input type="text" id="usuario" name="usuario" placeholder="Ingrese su usuario" required>
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" placeholder="Ingrese su contraseña" required>
                </div>
                <div class="form-group">
                    <label for="rol">Rol</label>
                    <select id="rol" name="rol" required>
                        <option value="">Seleccione un rol</option>
                        <option value="administrador">Administrador</option>
                        <option value="farmaceutico">Farmacéutico</option>
                    </select>
                </div>
                <button type="submit" class="btn-login">Iniciar Sesión</button>
            </form>
            <p class="login-note">Administrador: acceso total. Farmacéutico: solo ventas y stock.</p>
        </div>
    </div>
    <script src="../js/app.js"></script>
</body>
</html>
